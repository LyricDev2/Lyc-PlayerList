<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyric Players List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button class="close-btn" onclick="closeUI()">×</button>
        
        <div class="header">
            <div class="header-left">
                <div class="header-title">ONLINE PLAYERS</div>
                <div class="header-subtitle">REAL TIME PLAYER LIST</div>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <div class="stat-value" id="playerCount">0</div>
                    <div class="stat-label">PLAYERS ONLINE</div>
                </div>
            </div>
        </div>
        
        <div class="content" id="playersContent">
            <div class="empty-state">
                <i class="fas fa-users"></i>
                <div class="empty-state-text">LOADING PLAYERS...</div>
            </div>
        </div>

        <div class="footer">
            <div class="footer-text">AUTO REFRESH EVERY 5 SECONDS</div>
            <div class="footer-brand">LYRIC DEV - Your Server Name</div>
            <button class="refresh-btn" onclick="refreshData()">
                <i class="fas fa-sync-alt"></i>
                REFRESH NOW
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
